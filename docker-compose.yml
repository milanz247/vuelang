version: "3.9"

services:
  app:
    build: .
    ports:
      - "9090:9090"
    environment:
      ENV: production
      PORT: 9090
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: vuelang
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_NAME: vuelang
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:9090}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/vuelang", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: vuelang
      MYSQL_USER: vuelang
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
